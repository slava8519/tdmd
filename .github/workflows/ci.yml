name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopenmpi-dev openmpi-bin
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Pytest
        run: python -m pytest -q
      - name: VerifyLab smoke_ci strict
        run: python scripts/run_verifylab_matrix.py examples/td_1d_morse.yaml --preset smoke_ci --strict
      - name: VerifyLab interop_smoke strict
        run: python scripts/run_verifylab_matrix.py examples/td_1d_morse.yaml --preset interop_smoke --strict
      - name: VerifyLab eam_decomp_perf_smoke strict
        run: python scripts/run_verifylab_matrix.py examples/td_1d_morse.yaml --preset eam_decomp_perf_smoke --strict
